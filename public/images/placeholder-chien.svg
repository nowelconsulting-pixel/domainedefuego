<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#F5F3EF"/>
  <!-- Tail -->
  <path d="M142 148 Q168 124 162 100" stroke="#C8A870" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Body -->
  <ellipse cx="98" cy="152" rx="44" ry="30" fill="#D4B47C"/>
  <!-- Left ear (floppy) -->
  <ellipse cx="62" cy="96" rx="16" ry="28" fill="#BC9858" transform="rotate(-12 62 96)"/>
  <!-- Right ear (floppy) -->
  <ellipse cx="134" cy="96" rx="16" ry="28" fill="#BC9858" transform="rotate(12 134 96)"/>
  <!-- Head -->
  <circle cx="98" cy="91" r="38" fill="#D4B47C"/>
  <!-- Snout area -->
  <ellipse cx="98" cy="108" rx="18" ry="12" fill="#C8A870"/>
  <!-- Eyes -->
  <ellipse cx="85" cy="86" rx="7" ry="7.5" fill="#3A2C22"/>
  <ellipse cx="111" cy="86" rx="7" ry="7.5" fill="#3A2C22"/>
  <circle cx="87" cy="84" r="2.5" fill="white"/>
  <circle cx="113" cy="84" r="2.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="98" cy="104" rx="9" ry="7" fill="#3A2C22"/>
  <circle cx="95" cy="102" r="2.5" fill="white" opacity="0.5"/>
  <!-- Mouth -->
  <path d="M89 110 Q98 116 107 110" stroke="#3A2C22" stroke-width="1.5" fill="none" stroke-linecap="round"/>
