<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospection Domaine de Fuego</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F5F2EC;--surface:#FEFCF8;--border:#D8D2C4;--text:#1C1A16;--muted:#7A7468;
    --accent:#2C4A2E;--accent-light:#E8F0E8;--amber:#B5640A;--amber-light:#FDF0E0;
    --red:#8B2020;--red-light:#FDEAEA;--blue:#1A3A5C;--blue-light:#E8EFF8;
    --purple:#4A2E6E;--purple-light:#F0EBF8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem;}
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1.5px solid var(--border);flex-wrap:wrap;gap:1rem;}
  .logo-zone h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;}
  .logo-zone h1 span{font-style:italic;color:var(--accent);}
  .logo-zone p{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.08em;text-transform:uppercase;}
  .stats{display:flex;gap:1.25rem;align-items:flex-end;flex-wrap:wrap;}
  .stat{text-align:right;}
  .stat-num{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);line-height:1;}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
  .stat-sep{width:1px;height:36px;background:var(--border);}
  .toolbar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
  .filter-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;}
  .filter-btn{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;border-radius:2px;transition:all .15s;}
  .filter-btn:hover{background:var(--bg);color:var(--text);}
  .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .search-bar{margin-left:auto;font-family:'DM Mono',monospace;font-size:12px;padding:5px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:2px;outline:none;width:180px;}
  .search-bar:focus{border-color:var(--accent);}
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);font-size:12px;}
  thead tr{border-bottom:1.5px solid var(--border);}
  th{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:9px 12px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
  th:hover{color:var(--text);}
  .group-header td{background:var(--bg);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:7px 12px;border-bottom:1px solid var(--border);border-top:1.5px solid var(--border);font-weight:500;}
  td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr.data-row:hover td{background:var(--bg);}
  .commune-name{font-weight:500;font-size:13px;}
  .maire-name{color:var(--muted);font-size:11px;}
  .dist{font-variant-numeric:tabular-nums;color:var(--muted);}
  .dist.near{color:var(--accent);font-weight:500;}
  .badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:2px;font-weight:500;margin-right:3px;white-space:nowrap;}
  .badge-smgfavo{background:var(--accent-light);color:var(--accent);}
  .badge-rayon{background:var(--blue-light);color:var(--blue);}
  .badge-double{background:var(--purple-light);color:var(--purple);}
  .badge-urbain{background:#F0EDE8;color:#6B6358;}
  .statut-select{font-family:'DM Mono',monospace;font-size:11px;padding:3px 7px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:2px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;min-width:115px;}
  .statut-select.s-a_contacter{color:var(--muted);}
  .statut-select.s-contacte{border-color:var(--amber);background:var(--amber-light);color:var(--amber);}
  .statut-select.s-rdv{border-color:var(--blue);background:var(--blue-light);color:var(--blue);}
  .statut-select.s-positif{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
  .statut-select.s-negatif{border-color:var(--red);background:var(--red-light);color:var(--red);}
  .statut-select.s-sans_reponse{color:var(--muted);}
  .note-input{font-family:'DM Mono',monospace;font-size:11px;padding:3px 7px;border:1px solid transparent;background:transparent;color:var(--text);border-radius:2px;width:100%;outline:none;transition:border-color .15s;}
  .note-input:hover{border-color:var(--border);background:var(--surface);}
  .note-input:focus{border-color:var(--accent);background:var(--surface);}
  .note-input::placeholder{color:var(--border);}
  .date-input{font-family:'DM Mono',monospace;font-size:11px;padding:3px 7px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:2px;outline:none;width:108px;}
  .date-input:hover{border-color:var(--border);background:var(--surface);}
  .date-input:focus{border-color:var(--accent);background:var(--surface);color:var(--text);}

  #map-toggle{font-family:'DM Mono',monospace;font-size:11px;padding:5px 14px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;border-radius:2px;transition:all .15s;margin-bottom:.75rem;display:inline-block;}
  #map-toggle:hover{border-color:var(--accent);color:var(--accent);}
  #map-container{height:460px;border:1px solid var(--border);border-radius:2px;overflow:hidden;display:none;margin-bottom:.6rem;}
  #map-container.visible{display:block;}
  .map-legend{display:flex;gap:14px;margin-bottom:1.5rem;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;flex-wrap:wrap;}
  .leg-item{display:flex;align-items:center;gap:5px;}
  .leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:1.25rem;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
  .progress-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:5px;display:flex;justify-content:space-between;}
  footer{margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .btn{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;border-radius:2px;transition:all .15s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<header>
  <div class="logo-zone">
    <h1>Domaine de <span>Fuego</span></h1>
    <p>Suivi prospection foncière — Val-d'Oise · toutes communes</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="total-count">—</div><div class="stat-label">Total</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-num" id="contacte-count">0</div><div class="stat-label">Contactées</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-num" id="rdv-count">0</div><div class="stat-label">RDV</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-num" id="positif-count">0</div><div class="stat-label">Positives</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-num" id="negatif-count">0</div><div class="stat-label">Négatives</div></div>
  </div>
</header>

<button id="map-toggle" onclick="toggleMap()">&#9660; Afficher la carte du Val-d'Oise</button>
<div id="map-container"><div id="leaflet-map" style="height:100%;width:100%;"></div></div>
<div class="map-legend" id="map-legend" style="display:none;">
  <span class="leg-item"><span class="leg-dot" style="background:#E07B2A;"></span>Contact&#233;</span>
  <span class="leg-item"><span class="leg-dot" style="background:#C0392B;"></span>N&#233;gatif</span>
  <span class="leg-item"><span class="leg-dot" style="background:#2C7A4B;"></span>Positif</span>
  <span class="leg-item"><span class="leg-dot" style="background:#1A3A5C;"></span>RDV fix&#233;</span>
  <span class="leg-item"><span class="leg-dot" style="background:#B0A898;"></span>&#192; contacter</span>
</div>
<div class="toolbar">
  <span class="filter-label">Statut :</span>
  <button class="filter-btn active" onclick="setFilter('statut','tous',this)">Tous</button>
  <button class="filter-btn" onclick="setFilter('statut','a_contacter',this)">À contacter</button>
  <button class="filter-btn" onclick="setFilter('statut','contacte',this)">Contacté</button>
  <button class="filter-btn" onclick="setFilter('statut','rdv',this)">RDV</button>
  <button class="filter-btn" onclick="setFilter('statut','positif',this)">Positif</button>
  <button class="filter-btn" onclick="setFilter('statut','negatif',this)">Négatif</button>
  <button class="filter-btn" onclick="setFilter('statut','sans_reponse',this)">Sans réponse</button>
  <span class="filter-label" style="margin-left:8px">Zone :</span>
  <button class="filter-btn active" data-group="zone" onclick="setFilter('zone','tous',this)">Tous</button>
  <button class="filter-btn" data-group="zone" onclick="setFilter('zone','rayon',this)">Rayon 13 km</button>
  <button class="filter-btn" data-group="zone" onclick="setFilter('zone','hors',this)">Hors rayon</button>
  <input class="search-bar" type="text" placeholder="Rechercher…" oninput="searchTable(this.value)">
</div>

<table id="main-table">
  <thead>
    <tr>
      <th onclick="sortTable(0)">Commune</th>
      <th onclick="sortTable(1)">Maire</th>
      <th onclick="sortTable(2)">km</th>
      <th>Tags</th>
      <th onclick="sortTable(4)">Statut</th>
      <th>Contact</th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
<div class="progress-label"><span>Taux de contact</span><span id="progress-pct">0%</span></div>

<footer>
  <span id="footer-info">—</span>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="exportCSV()">↓ Export CSV</button>
    <button class="btn" onclick="resetAll()">⟳ Réinitialiser</button>
  </div>
</footer>

const STATUT_COLORS={a_contacter:"#B0A898",contacte:"#E07B2A",rdv:"#1A3A5C",positif:"#2C7A4B",negatif:"#C0392B",sans_reponse:"#999"};
let leafletMap=null,mapMarkers=[],mapVisible=false;

function loadLeafletAndInit(){
  if(window.L){initMap();return;}
  var s=document.createElement("script");
  s.src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
  s.onload=initMap;
  document.head.appendChild(s);
}
function initMap(){
  var cont=document.getElementById("map-container");
  cont.classList.add("visible");
  setTimeout(function(){
    leafletMap=L.map("leaflet-map",{zoomControl:true}).setView([49.07,2.12],10);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
      attribution:"&copy; OpenStreetMap &copy; CARTO",maxZoom:18
    }).addTo(leafletMap);
    refreshMapMarkers();
  },80);
}
function refreshMapMarkers(){
  if(!leafletMap) return;
  mapMarkers.forEach(function(m){m.remove();});
  mapMarkers=[];
  DATA.forEach(function(d,i){
    var coords=COORDS[d.commune];
    if(!coords) return;
    var s=getRow(i);
    var color=STATUT_COLORS[s.statut]||"#B0A898";
    var contacted=s.statut!=="a_contacter";
    var m=L.circleMarker(coords,{
      radius:contacted?7:5,fillColor:color,color:"#fff",
      weight:contacted?1.5:1,opacity:1,fillOpacity:contacted?0.92:0.5
    });
    m.bindPopup("<div style=\"font-family:monospace;font-size:12px;min-width:140px\"><strong>"+d.commune+"</strong><br><span style=\"color:#7A7468;font-size:11px\">"+d.maire+"</span><br><span style=\"color:"+color+";font-weight:600\">"+LABELS[s.statut]+"</span>"+(s.note?"<br><em style=\"font-size:10px;color:#7A7468\">"+s.note+"</em>":"")+"</div>",{maxWidth:220});
    m.addTo(leafletMap);
    mapMarkers.push(m);
  });
}
function toggleMap(){
  mapVisible=!mapVisible;
  var btn=document.getElementById("map-toggle");
  var leg=document.getElementById("map-legend");
  btn.textContent=mapVisible?"▲ Masquer la carte":"▼ Afficher la carte du Val-d\'Oise";
  leg.style.display=mapVisible?"flex":"none";
  if(mapVisible&&!leafletMap){loadLeafletAndInit();}
  else if(mapVisible&&leafletMap){leafletMap.invalidateSize();refreshMapMarkers();}
  else{document.getElementById("map-container").classList.remove("visible");}
}
var _ouSav=updateStatut;
function updateStatut(i,sel){_ouSav(i,sel);if(mapVisible)refreshMapMarkers();}

// Rayon 13km depuis Épiais-Rhus

const STATUTS=["a_contacter","contacte","rdv","positif","negatif","sans_reponse"];
const LABELS={a_contacter:"À contacter",contacte:"Contacté",rdv:"RDV fixé",positif:"Positif",negatif:"Négatif",sans_reponse:"Sans réponse"};

// Load persisted state
let state={};
try{state=JSON.parse(localStorage.getItem('fuego_v4')||'{}');}catch(e){}

// Pre-fill ONLY if nothing is stored yet (first load)
const hasStoredData = Object.keys(state).length > 0;
if(!hasStoredData){
  DATA.forEach((d,i)=>{
    const initStatut = INIT[d.commune]||'a_contacter';
    const initDate = initStatut !== 'a_contacter' ? '2026-05-07' : '';
    state[i]={statut:initStatut, date:initDate, note:''};
  });
  saveState();
}

function saveState(){localStorage.setItem('fuego_v4',JSON.stringify(state));}
function getRow(i){return state[i]||{statut:'a_contacter',date:'',note:''};}

let fStatut='tous',fZone='tous',fSearch='';
let sCol=2,sAsc=true;

function setFilter(group,val,btn){
  if(group==='statut') fStatut=val;
  if(group==='zone') fZone=val;
  const grpSel = group==='zone'?'[data-group="zone"]':'.toolbar .filter-btn:not([data-group])';
  document.querySelectorAll(grpSel).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}
function searchTable(v){fSearch=v;renderTable();}
function sortTable(col){if(sCol===col)sAsc=!sAsc;else{sCol=col;sAsc=true;}renderTable();}

function renderTable(){
  let rows=DATA.map((d,i)=>({...d,i,...getRow(i)}));
  if(fStatut!=='tous') rows=rows.filter(r=>r.statut===fStatut);
  if(fZone==='rayon') rows=rows.filter(r=>RAYON13.has(r.commune));
  if(fZone==='hors') rows=rows.filter(r=>!RAYON13.has(r.commune));
  if(fSearch){const s=fSearch.toLowerCase();rows=rows.filter(r=>r.commune.toLowerCase().includes(s)||r.maire.toLowerCase().includes(s));}

  rows.sort((a,b)=>{
    let va,vb;
    if(sCol===0){va=a.commune;vb=b.commune;}
    else if(sCol===1){va=a.maire;vb=b.maire;}
    else if(sCol===2){va=a.dist??999;vb=b.dist??999;}
    else if(sCol===4){va=a.statut;vb=b.statut;}
    else{va=0;vb=0;}
    if(va<vb)return sAsc?-1:1;
    if(va>vb)return sAsc?1:-1;
    return 0;
  });

  // split groups
  const inRayon=rows.filter(r=>RAYON13.has(r.commune));
  const outRayon=rows.filter(r=>!RAYON13.has(r.commune));

  let html='';
  if(inRayon.length&&fZone!=='hors'){
    html+=`<tr class="group-header"><td colspan="7">Zone prioritaire — rayon 13 km Épiais-Rhus (${inRayon.length})</td></tr>`;
    html+=inRayon.map(r=>rowHTML(r)).join('');
  }
  if(outRayon.length&&fZone!=='rayon'){
    html+=`<tr class="group-header"><td colspan="7">Hors rayon — Val-d'Oise (${outRayon.length})</td></tr>`;
    html+=outRayon.map(r=>rowHTML(r)).join('');
  }
  if(!html) html=`<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted)">Aucun résultat</td></tr>`;
  document.getElementById('table-body').innerHTML=html;
  updateStats();
}

function rowHTML(r){
  let badges='';
  if(r.smgfavo) badges+=`<span class="badge badge-smgfavo">SMGFAVO</span>`;
  if(RAYON13.has(r.commune)) badges+=` <span class="badge badge-rayon">≤13 km</span>`;
  if(CONSEILLERS.has(r.commune)) badges+=` <span class="badge badge-double">Cons.dép.</span>`;
  const opts=STATUTS.map(s=>`<option value="${s}" ${r.statut===s?'selected':''}>${LABELS[s]}</option>`).join('');
  const distTxt=r.dist!=null?(r.dist===0?'⚑ centre':`${r.dist} km`):'—';
  const distClass=r.dist!=null&&r.dist<=5?'near':'';
  return `<tr class="data-row">
    <td><div class="commune-name">${r.commune}</div></td>
    <td><span class="maire-name">${r.maire}</span></td>
    <td><span class="dist ${distClass}">${distTxt}</span></td>
    <td>${badges}</td>
    <td><select class="statut-select s-${r.statut}" onchange="updateStatut(${r.i},this)">${opts}</select></td>
    <td><input type="date" class="date-input" value="${r.date}" onchange="updateDate(${r.i},this)"></td>
    <td><input type="text" class="note-input" placeholder="Note…" value="${r.note}" onchange="updateNote(${r.i},this)"></td>
  </tr>`;
}

function updateStatut(i,sel){
  const s=getRow(i);s.statut=sel.value;sel.className=`statut-select s-${sel.value}`;
  if(!s.date){s.date=new Date().toISOString().split('T')[0];sel.closest('tr').querySelector('.date-input').value=s.date;}
  state[i]=s;saveState();updateStats();
}
function updateDate(i,inp){const s=getRow(i);s.date=inp.value;state[i]=s;saveState();}
function updateNote(i,inp){const s=getRow(i);s.note=inp.value;state[i]=s;saveState();}

function updateStats(){
  const all=DATA.map((_,i)=>getRow(i));
  const contacte=all.filter(r=>r.statut!=='a_contacter').length;
  const rdv=all.filter(r=>r.statut==='rdv').length;
  const positif=all.filter(r=>r.statut==='positif').length;
  const negatif=all.filter(r=>r.statut==='negatif').length;
  document.getElementById('total-count').textContent=DATA.length;
  document.getElementById('contacte-count').textContent=contacte;
  document.getElementById('rdv-count').textContent=rdv;
  document.getElementById('positif-count').textContent=positif;
  document.getElementById('negatif-count').textContent=negatif;
  const pct=Math.round(contacte/DATA.length*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('footer-info').textContent=`${DATA.length} communes · ${contacte} contactées · ${positif} positives · ${negatif} négatives`;
}

function exportCSV(){
  const headers=['Commune','Maire','Distance km','SMGFAVO','Rayon 13km','Statut','Date contact','Notes'];
  const rows=DATA.map((d,i)=>{
    const s=getRow(i);
    return [d.commune,d.maire,d.dist??'',d.smgfavo?'Oui':'Non',RAYON13.has(d.commune)?'Oui':'Non',LABELS[s.statut],s.date,s.note].map(v=>`"${v}"`).join(',');
  });
  const csv=[headers.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='prospection_fuego_v3.csv';a.click();
}

function resetAll(){
  if(confirm('Réinitialiser toutes les données de suivi ?')){
    localStorage.removeItem('fuego_v4');
    state={};
    DATA.forEach((d,i)=>{
      const initStatut=INIT[d.commune]||'a_contacter';
      const initDate=initStatut!=='a_contacter'?'2026-05-07':'';
      state[i]={statut:initStatut,date:initDate,note:''};
    });
    saveState();renderTable();
  }
}

renderTable();
