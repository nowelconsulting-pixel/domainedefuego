<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#F5F3EF"/>
  <!-- Tail -->
  <path d="M140 152 Q172 118 158 86" stroke="#C9BAA0" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Body -->
  <ellipse cx="97" cy="152" rx="42" ry="30" fill="#D4C4A8"/>
  <!-- Head -->
  <circle cx="97" cy="92" r="40" fill="#DDD0B6"/>
  <!-- Ear left -->
  <polygon points="62,62 48,28 78,54" fill="#DDD0B6"/>
  <polygon points="64,60 54,36 76,54" fill="#F0BCAA"/>
  <!-- Ear right -->
  <polygon points="132,62 146,28 116,54" fill="#DDD0B6"/>
  <polygon points="130,60 140,36 118,54" fill="#F0BCAA"/>
  <!-- Eyes -->
  <ellipse cx="84" cy="89" rx="8" ry="9" fill="#3A2C22"/>
  <ellipse cx="110" cy="89" rx="8" ry="9" fill="#3A2C22"/>
  <circle cx="86" cy="87" r="3" fill="white"/>
  <circle cx="112" cy="87" r="3" fill="white"/>
  <!-- Nose -->
  <polygon points="97,103 93,108 101,108" fill="#CC7766"/>
  <!-- Mouth -->
  <path d="M93 108 Q97 113 101 108" stroke="#5A4535" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="97" y1="104" x2="62" y2="97" stroke="#B0A090" stroke-width="1.5" opacity="0.8"/>
  <line x1="97" y1="105" x2="62" y2="105" stroke="#B0A090" stroke-width="1.5" opacity="0.8"/>
  <line x1="97" y1="104" x2="132" y2="97" stroke="#B0A090" stroke-width="1.5" opacity="0.8"/>
  <line x1="97" y1="105" x2="132" y2="105" stroke="#B0A090" stroke-width="1.5" opacity="0.8"/>
</svg>
